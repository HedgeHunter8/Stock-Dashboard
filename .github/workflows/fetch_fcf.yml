name: Nightly FCF Data Fetch

on:
  # Run every night at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-fcf:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit fcf_data.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run FCF fetch script
        run: python fetch_fcf.py

      - name: Commit and push fcf_data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fcf_data.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: nightly FCF data update $(date -u '+%Y-%m-%d')"
          git push
