<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  padding: 24px 20px;
}
#app { max-width: 1300px; margin: 0 auto; }

/* ── Top bar ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  border-bottom: 1px solid #30363d;
  padding-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.title-block .main-title { font-size: 20px; font-weight: 700; color: #e6edf3; letter-spacing: 2px; }
.title-block .sub-title  { font-size: 11px; color: #8b949e; margin-top: 3px; }

/* ── Portfolio switcher ── */
.portfolio-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.ptab {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #8b949e;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  font-weight: 700;
  padding: 9px 18px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.ptab:hover  { border-color: #58a6ff; color: #c9d1d9; }
.ptab.active { background: #1c2a3a; border-color: #388bfd; color: #58a6ff; }

/* ── Load button ── */
#fetch-btn {
  background: #1f6feb;
  border: 2px solid #388bfd;
  border-radius: 8px;
  color: #fff;
  font-family: 'Courier New', Courier, monospace;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 26px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 10px rgba(56,139,253,0.4);
  white-space: nowrap;
}
#fetch-btn:hover:not(:disabled) { background: #388bfd; box-shadow: 0 0 18px rgba(56,139,253,0.7); }
#fetch-btn:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; box-shadow: none; }

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: #8b949e;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 9px 14px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 8px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
.dot.loading  { background: #d29922; animation: pulse 1s infinite; }
.dot.error    { background: #f85149; }
.dot.cooldown { background: #58a6ff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.progress-wrap { flex: 1; min-width: 80px; background: #21262d; border-radius: 4px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; background: #388bfd; transition: width 0.3s; width: 0%; }

/* ── Portfolio panel ── */
.portfolio-panel { display: none; }
.portfolio-panel.active { display: block; }
.portfolio-name {
  font-size: 16px;
  font-weight: 700;
  color: #e6edf3;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

/* ── Table ── */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: #161b22;

  white-space: nowrap;

thead th:not(:first-child) { text-align: right; }
tbody tr {

tbody tr:hover { background: #161b22; }
tbody td {
  padding: 11px 14px;

.val { font-size: 13px; color: #e6edf3; }

.val.red   { color: #f85149; }
.val.amber { color: #d29922; }

.row-status.done    { color: #3fb950; }
.row-status.error   { color: #f85149; }

/* sortable headers */
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: #c9d1d9; background: #1c2230; }
th.sortable .sort-icon { margin-left: 5px; opacity: 0.35; font-size: 9px; }
th.sortable.asc  .sort-icon::after { content: '▲'; opacity: 1; color: #58a6ff; }
th.sortable.desc .sort-icon::after { content: '▼'; opacity: 1; color: #58a6ff; }
th.sortable:not(.asc):not(.desc) .sort-icon::after { content: '⇅'; }

.summary-strip span { display: flex; align-items: center; gap: 5px; }
.sdot { width: 7px; height: 7px; border-radius: 50%; }

/* ── Chart drawer ── */

.chart-drawer td { padding: 0; }
.chart-drawer .drawer-inner { display: none; }
.chart-drawer.open .drawer-inner { display: block; padding: 20px; }
.chart-drawer.open { border-top: 1px solid #388bfd; border-bottom: 1px solid #30363d; }
.drawer-header {

.drawer-title { font-size: 15px; font-weight: 700; color: #e6edf3; letter-spacing: 2px; }
.drawer-close {

  color: #8b949e; font-family: 'Courier New', monospace; font-size: 12px;

.drawer-close:hover { border-color: #f85149; color: #f85149; }
.charts-grid {

.charts-grid .chart-panel.full-width {

@media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-panel {

.chart-panel-title { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }

.chart-legend span { display: flex; align-items: center; gap: 4px; }
.cleg { width: 18px; height: 2px; border-radius: 1px; }

tbody tr.data-row { cursor: pointer; }
tbody tr.data-row:hover { background: #1c2230; }
tbody tr.data-row.expanded { background: #161b22; }

// ── State ────────────────────────────────────────────────────────────────────
// Sliding window: timestamps (ms) of every API call made this session.
// Before each call, prune entries older than 61s. If window is full, wait.
const callTimestamps = [];
const WINDOW_MS = 61000;
const MAX_PER_WINDOW = 8;

let activePortfolioId = PORTFOLIOS[0].id;
let fetchAbort = false;
let fcfData = {}; // loaded from fcf_data.json on page load
const tickerData = {}; // stores daily closes + volume keyed by sym
const openDrawer = { sym: null, charts: [] }; // track open drawer

// ── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(msg, state) {
  document.getElementById('stext').textContent = msg;
  const d = document.getElementById('sdot');
  d.className = 'dot' + (state ? ' ' + state : '');
}
function updCredits() {
  const now = Date.now();
  const recent = callTimestamps.filter(t => now - t < WINDOW_MS).length;
  document.getElementById('scredits').textContent = 'Credits: ' + recent + '/8';
}
function setProgress(n, total) {
  document.getElementById('progress').style.width = (total > 0 ? Math.round(n / total * 100) : 0) + '%';
}

}

function calcSMA(arr, n) {
  if (arr.length < n) return null;
  return arr.slice(-n).reduce((a, b) => a + b, 0) / n;
}
function calcRSI(closes, period) {
  period = period || 14;
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d >= 0) gains += d; else losses -= d;
  }
  let ag = gains / period, al = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    ag = (ag * (period - 1) + Math.max(d, 0)) / period;
    al = (al * (period - 1) + Math.max(-d, 0)) / period;
  }
  if (al === 0) return 100;
  return 100 - (100 / (1 + ag / al));
}
function rsiClass(v) { return v >= 70 ? 'red' : v <= 30 ? 'green' : 'amber'; }

function calcATR(dailyValues, period) {
  // dailyValues is the raw reversed array with .high .low .close
  period = period || 14;
  if (dailyValues.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < dailyValues.length; i++) {
    const high  = parseFloat(dailyValues[i].high);
    const low   = parseFloat(dailyValues[i].low);
    const prevC = parseFloat(dailyValues[i-1].close);
    const tr = Math.max(high - low, Math.abs(high - prevC), Math.abs(low - prevC));
    trs.push(tr);
  }
  // Wilder smoothing: seed with SMA of first `period` TRs
  let atr = trs.slice(0, period).reduce((a,b) => a+b, 0) / period;
  for (let i = period; i < trs.length; i++) {
    atr = (atr * (period - 1) + trs[i]) / period;
  }
  return atr;
}

// ── Rate-limited API call ────────────────────────────────────────────────────
// Uses a sliding 61-second window. Waits automatically if 8 calls have been
// made in the last 61s, regardless of session resets or multiple Load clicks.

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function waitForSlot() {
  // Show countdown while waiting for the oldest call to age out of the window
  while (true) {
    if (fetchAbort) throw new Error('ABORTED');
    const now = Date.now();
    // Prune timestamps outside the window
    while (callTimestamps.length && now - callTimestamps[0] >= WINDOW_MS) {
      callTimestamps.shift();
    }
    if (callTimestamps.length < MAX_PER_WINDOW) return; // slot available
    // Calculate wait: how long until oldest call exits the window
    const waitMs = WINDOW_MS - (now - callTimestamps[0]) + 100; // +100ms buffer
    const waitSecs = Math.ceil(waitMs / 1000);
    setStatus('Rate limit — waiting ' + waitSecs + 's for next available slot...', 'cooldown');
    updCredits();
    await sleep(Math.min(waitMs, 1000)); // check every second
  }
}

async function apiGet(sym, interval, retries) {
  retries = retries || 0;
  await waitForSlot();
  if (fetchAbort) throw new Error('ABORTED');

  const url = 'https://api.twelvedata.com/time_series'
    + '?symbol=' + encodeURIComponent(sym)
    + '&interval=' + interval
    + '&outputsize=' + (interval === '1day' ? 250 : 200)
    + '&apikey=' + API_KEY;

  const res = await fetch(url);

  // 429 = server-side rate limit hit — wait 61s and retry (up to 3 times)
  if (res.status === 429) {
    if (retries >= 3) throw new Error('429 after 3 retries for ' + sym);
    let secs = 61;
    const countdown = async () => {
      while (secs > 0) {
        if (fetchAbort) throw new Error('ABORTED');
        setStatus('429 rate limit from server — waiting ' + secs + 's before retry...', 'cooldown');
        await sleep(1000);
        secs--;
      }
    };
    await countdown();
    return apiGet(sym, interval, retries + 1);
  }

  if (!res.ok) throw new Error('HTTP ' + res.status + ' for ' + sym);
  const data = await res.json();
  if (data.status === 'error') throw new Error(data.message);

  // Record this successful call in the sliding window
  callTimestamps.push(Date.now());
  updCredits();
  return data;
}

  }
}

// ── Sort table ───────────────────────────────────────────────────────────────
function sortTable(th) {
  const col = th.getAttribute('data-col');
  const pid = th.getAttribute('data-pid');
  const tbody = document.getElementById('tbody-' + pid);
  if (!tbody) return;

  // Determine direction
  const wasAsc = th.classList.contains('asc');
  const isAsc  = !wasAsc;

  // Clear all sort indicators in this table
  th.closest('thead').querySelectorAll('th.sortable').forEach(h => {
    h.classList.remove('asc', 'desc');
  });
  th.classList.add(isAsc ? 'asc' : 'desc');

  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const tdA = a.querySelector('[id$="-' + col + '"]');
    const tdB = b.querySelector('[id$="-' + col + '"]');
    const valA = tdA ? parseFloat(tdA.parentElement.getAttribute('data-val')) : NaN;
    const valB = tdB ? parseFloat(tdB.parentElement.getAttribute('data-val')) : NaN;
    // Push rows with no data to the bottom always
    if (isNaN(valA) && isNaN(valB)) return 0;
    if (isNaN(valA)) return 1;
    if (isNaN(valB)) return -1;
    return isAsc ? valA - valB : valB - valA;
  });
  rows.forEach(r => tbody.appendChild(r));
}

// ── Chart math helpers ───────────────────────────────────────────────────────
function calcEMA(arr, period) {
  if (arr.length < period) return [];
  const k = 2 / (period + 1);
  const result = new Array(arr.length).fill(null);
  // Seed with SMA
  let seed = arr.slice(0, period).reduce((a,b) => a+b, 0) / period;
  result[period - 1] = seed;
  for (let i = period; i < arr.length; i++) {
    result[i] = arr[i] * k + result[i-1] * (1 - k);
  }
  return result;
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const macdLine = closes.map((_, i) =>
    ema12[i] !== null && ema26[i] !== null ? ema12[i] - ema26[i] : null
  );
  // Signal = 9-period EMA of macdLine (skip nulls)
  const validMacd = macdLine.filter(v => v !== null);
  const signalFull = calcEMA(validMacd, 9);
  // Re-map signal back to full length
  const signal = new Array(closes.length).fill(null);
  let si = 0;
  for (let i = 0; i < closes.length; i++) {
    if (macdLine[i] !== null) { signal[i] = signalFull[si] || null; si++; }
  }
  const histogram = closes.map((_, i) =>
    macdLine[i] !== null && signal[i] !== null ? macdLine[i] - signal[i] : null
  );
  return { macdLine, signal, histogram };
}

function calcRSIFull(closes, period) {
  period = period || 14;
  const result = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return result;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i-1];
    if (d >= 0) gains += d; else losses -= d;
  }
  let ag = gains / period, al = losses / period;
  const rsi = (ag, al) => al === 0 ? 100 : 100 - (100 / (1 + ag/al));
  result[period] = rsi(ag, al);
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    ag = (ag * (period-1) + Math.max(d,0)) / period;
    al = (al * (period-1) + Math.max(-d,0)) / period;
    result[i] = rsi(ag, al);
  }
  return result;
}

function calcSMAFull(closes, period) {
  return closes.map((_, i) =>
    i >= period - 1 ? closes.slice(i - period + 1, i + 1).reduce((a,b)=>a+b,0)/period : null
  );
}

// ── Drawer toggle ─────────────────────────────────────────────────────────────
function destroyOpenCharts() {
  openDrawer.charts.forEach(c => { try { c.destroy(); } catch(e){} });
  openDrawer.charts = [];
}

function toggleDrawer(pid, sym, name, rowEl) {
  const safeId = sym.replace(/[^a-zA-Z0-9]/g, '_');
  const drawerId = 'drawer-' + pid + '-' + safeId;
  const drawerEl = document.getElementById(drawerId);
  if (!drawerEl) return;

  const isOpen = drawerEl.classList.contains('open');

  // Close any open drawer first
  destroyOpenCharts();
  document.querySelectorAll('.chart-drawer.open').forEach(d => {
    d.classList.remove('open');
    const inner = d.querySelector('.drawer-inner');
    if (inner) inner.innerHTML = '';
  });
  document.querySelectorAll('tr.data-row.expanded').forEach(r => r.classList.remove('expanded'));

  if (isOpen) return; // was open — just close it

  // No data yet
  if (!tickerData[sym]) {
    const inner = document.getElementById('drawerinner-' + pid + '-' + safeId);
    if (inner) inner.innerHTML = '<div style="padding:20px;color:#484f58;font-size:12px;">⏳ Data not loaded yet — click LOAD DATA first</div>';
    drawerEl.classList.add('open');
    rowEl.classList.add('expanded');
    return;
  }

  drawerEl.classList.add('open');
  rowEl.classList.add('expanded');
  openDrawer.sym = sym;

  const inner = document.getElementById('drawerinner-' + pid + '-' + safeId);
  const { closes, volumes, dates } = tickerData[sym];
  const N = 100; // show last 100 days
  const c = closes.slice(-N);
  const v = volumes.slice(-N);
  const d = dates.slice(-N);
  const offset = closes.length - N;

  // Compute indicators over full history, then slice last N
  const sma50full  = calcSMAFull(closes, 50);
  const sma200full = calcSMAFull(closes, 200);
  const rsiFull    = calcRSIFull(closes);
  const { macdLine, signal, histogram } = calcMACD(closes);
  const vol20avg   = closes.map((_, i) => {
    if (i < 19) return null;
    return volumes.slice(i-19, i+1).reduce((a,b)=>a+b,0)/20;
  });

  const sma50s  = sma50full.slice(-N);
  const sma200s = sma200full.slice(-N);
  const rsiS    = rsiFull.slice(-N);
  const macdS   = macdLine.slice(-N);
  const sigS    = signal.slice(-N);
  const histS   = histogram.slice(-N);
  const vol20s  = vol20avg.slice(-N);

  const upDays   = c.map((p,i) => i === 0 ? false : p >= c[i-1]);
  const volColors = v.map((_, i) => upDays[i] ? 'rgba(63,185,80,0.7)' : 'rgba(248,81,73,0.7)');
  const histColors = histS.map(h => h === null ? 'transparent' : h >= 0 ? 'rgba(63,185,80,0.8)' : 'rgba(248,81,73,0.8)');

  // FCF history data for this ticker
  const fcfEntry   = fcfData[sym] || {};
  const fcfHistory = fcfEntry.history || [];
  const fcfAvg5y   = fcfEntry.avg5y   || null;
  const fcfCurrent = fcfEntry.current || null;
  const fcfHasData = fcfHistory.length > 0;

  inner.innerHTML = `
    <div class="drawer-header">
      <div class="drawer-title">${sym} <span style="font-size:12px;color:#8b949e;font-weight:400;letter-spacing:0">${name}</span></div>
      <button class="drawer-close" onclick="closeDrawer('${pid}','${safeId}','${drawerId}')">✕ Close</button>
    </div>
    <div class="charts-grid">
      <div class="chart-panel">
        <div class="chart-panel-title">Price + Moving Averages (Last 100 Days)</div>
        <div class="chart-legend">
          <span><span class="cleg" style="background:#58a6ff"></span>Price</span>
          <span><span class="cleg" style="background:#f0883e"></span>50-Day SMA</span>
          <span><span class="cleg" style="background:#bc8cff"></span>200-Day SMA</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="dc-price-${safeId}"></canvas></div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-title">RSI (14-Period Daily)</div>
        <div class="chart-legend">
          <span><span class="cleg" style="background:#58a6ff"></span>RSI</span>
          <span style="color:#f85149">▲ 70 Overbought</span>
          <span style="color:#3fb950">▼ 30 Oversold</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="dc-rsi-${safeId}"></canvas></div>
      </div>
      <div class="chart-panel full-width">
        <div class="chart-panel-title">FCF Yield — Annual History &amp; 5-Year Average</div>
        <div class="chart-legend">
          <span><span class="cleg" style="background:#3fb950"></span>Annual FCF Yield</span>
          <span><span class="cleg" style="background:#d29922"></span>5-Year Avg</span>
          <span><span class="cleg" style="background:#58a6ff"></span>Current TTM</span>
        </div>
        <div style="position:relative;height:200px"><canvas id="dc-fcf-${safeId}"></canvas></div>
        ${!fcfHasData ? '<div style="color:#484f58;font-size:11px;margin-top:8px;">⏳ FCF data not yet available — run the GitHub Action to populate</div>' : ''}
      </div>
    </div>
    <div class="chart-hint">Click any row again to close · Price &amp; RSI: last 100 trading days · FCF: annual, up to 5 years</div>`;

  // Chart defaults
  const xAxis    = { ticks: { color: '#8b949e', maxTicksLimit: 8, font: { size: 9 } }, grid: { color: '#1e242c' } };
  const yAxis    = (cb) => ({ ticks: { color: '#8b949e', font: { size: 9 }, callback: cb || (v => v) }, grid: { color: '#1e242c' } });
  const noLegend = { legend: { display: false } };

  // ── Price chart ────────────────────────────────────────────────────────────
  const pc = new Chart(document.getElementById('dc-price-'+safeId), {
    type: 'line',
    data: { labels: d, datasets: [
      { label:'Price',   data:c,      borderColor:'#58a6ff', borderWidth:1.5, pointRadius:0, tension:0.1, fill:false },
      { label:'50 SMA',  data:sma50s, borderColor:'#f0883e', borderWidth:1.5, pointRadius:0, fill:false },
      { label:'200 SMA', data:sma200s,borderColor:'#bc8cff', borderWidth:1.5, pointRadius:0, fill:false }
    ]},
    options: { responsive:true, maintainAspectRatio:false, plugins:noLegend,
      scales:{ x:xAxis, y:yAxis(v=>'$'+v.toFixed(0)) }}
  });

  // ── RSI chart ──────────────────────────────────────────────────────────────
  const rc = new Chart(document.getElementById('dc-rsi-'+safeId), {
    type: 'line',
    data: { labels: d, datasets: [
      { label:'RSI', data:rsiS, borderColor:'#58a6ff', borderWidth:1.5, pointRadius:0, fill:false,
        segment: { borderColor: ctx => {
          const v = ctx.p1.parsed.y;
          return v >= 70 ? '#f85149' : v <= 30 ? '#3fb950' : '#58a6ff';
        }}
      },
      { label:'OB', data:d.map(()=>70), borderColor:'rgba(248,81,73,0.35)', borderWidth:1, borderDash:[4,3], pointRadius:0, fill:false },
      { label:'OS', data:d.map(()=>30), borderColor:'rgba(63,185,80,0.35)',  borderWidth:1, borderDash:[4,3], pointRadius:0, fill:false }
    ]},
    options: { responsive:true, maintainAspectRatio:false, plugins:noLegend,
      scales:{ x:xAxis, y:{ min:0, max:100, ticks:{ color:'#8b949e', font:{size:9}, stepSize:25 }, grid:{ color:'#1e242c' } } }}
  });

  // ── FCF Yield history chart ────────────────────────────────────────────────
  const fcfLabels   = fcfHistory.map(h => String(h.year));
  const fcfYields   = fcfHistory.map(h => h.fcfYield !== null ? +(h.fcfYield * 100).toFixed(2) : null);
  const fcfAvgLine  = fcfLabels.map(() => fcfAvg5y !== null ? +(fcfAvg5y * 100).toFixed(2) : null);
  const fcfCurLine  = fcfLabels.map(() => fcfCurrent !== null ? +(fcfCurrent * 100).toFixed(2) : null);
  const barColors   = fcfYields.map(v => v === null ? 'transparent' : v >= 5 ? 'rgba(63,185,80,0.75)' : v >= 2 ? 'rgba(88,166,255,0.75)' : v >= 0 ? 'rgba(210,153,34,0.75)' : 'rgba(248,81,73,0.75)');

  const fc = new Chart(document.getElementById('dc-fcf-'+safeId), {
    type: 'bar',
    data: {
      labels: fcfLabels.length ? fcfLabels : ['No data'],
      datasets: [
        { label:'FCF Yield %', data: fcfYields.length ? fcfYields : [0],
          backgroundColor: barColors, borderWidth:0, order:2 },
        { label:'5yr Avg', data: fcfAvgLine.length ? fcfAvgLine : [null],
          type:'line', borderColor:'#d29922', borderWidth:2, borderDash:[5,3],
          pointRadius:0, fill:false, order:1 },
        { label:'Current TTM', data: fcfCurLine.length ? fcfCurLine : [null],
          type:'line', borderColor:'#58a6ff', borderWidth:2, borderDash:[3,3],
          pointRadius:0, fill:false, order:1 }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:noLegend,
      scales:{
        x: xAxis,
        y: { ticks:{ color:'#8b949e', font:{size:9}, callback: v => v+'%' }, grid:{ color:'#1e242c' } }
      }
    }
  });

  openDrawer.charts = [pc, rc, fc];
}

function closeDrawer(pid, safeId, drawerId) {
  destroyOpenCharts();
  const el = document.getElementById(drawerId);
  if (el) {
    el.classList.remove('open');
    // Clear inner content after hiding so canvases don't linger
    const inner = el.querySelector('.drawer-inner');
    if (inner) inner.innerHTML = '';
  }
  const rowEl = document.getElementById('row-' + pid + '-' + safeId);
  if (rowEl) rowEl.classList.remove('expanded');
  openDrawer.sym = null;
}

// ── Switch portfolio ─────────────────────────────────────────────────────────
function switchPortfolio(id) {
  activePortfolioId = id;
  document.querySelectorAll('.portfolio-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('ptab-' + id).classList.add('active');
  setStatus('Switched to ' + PORTFOLIOS.find(p => p.id === id).name + ' — click LOAD DATA to fetch', '');
  setProgress(0, 1);
  setETA('');
}

// ── Render one row ───────────────────────────────────────────────────────────
function renderRow(portfolioId, sym, dailyData, weeklyData) {
  const safeId = sym.replace(/[^a-zA-Z0-9]/g, '_');
  const pid = portfolioId;

  const dv = dailyData.values.slice().reverse();
  const dc = dv.map(v => parseFloat(v.close));
  const dv_vol = dv.map(v => parseFloat(v.volume) || 0);
  const dd = dv.map(v => v.datetime.slice(5));
  const wv = weeklyData.values.slice().reverse();
  const wc = wv.map(v => parseFloat(v.close));
  // Store for chart drawer
  tickerData[sym] = { closes: dc, volumes: dv_vol, dates: dd, rawDaily: dv };

  const price   = dc[dc.length - 1];
  const sma50   = calcSMA(dc, 50);
  const sma200  = calcSMA(dc, 200);
  const sma200w = calcSMA(wc, 200); // 200-week SMA
  const rsiD    = calcRSI(dc);
  const rsiW    = calcRSI(wc);

  const setSpan = (id, txt, cls) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = txt;
    el.className = 'val' + (cls ? ' ' + cls : '');
  };
  const setBadge = (id, txt, cls) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = txt;
    el.className = 'rsi-badge' + (cls ? ' ' + cls : '');
  };
  // Store numeric sort value on the parent <td>
  const setTdVal = (id, num) => {
    const el = document.getElementById(id);
    if (el && el.parentElement) el.parentElement.setAttribute('data-val', isNaN(num) ? '' : num);
  };

  // Price (no color coding, just display)
  const priceEl = document.getElementById(pid+'-'+safeId+'-price');
  if (priceEl) { priceEl.textContent = fmtPrice(price); priceEl.className = 'val'; }

  if (sma50) {
    setSpan(pid+'-'+safeId+'-sma50', fmtPrice(sma50), price > sma50 ? 'green' : 'red');
    setTdVal(pid+'-'+safeId+'-sma50', sma50);
  }
  if (sma200) {
    setSpan(pid+'-'+safeId+'-sma200', fmtPrice(sma200), price > sma200 ? 'green' : 'red');
    setTdVal(pid+'-'+safeId+'-sma200', sma200);
    const pct = ((price - sma200) / sma200 * 100);
    setSpan(pid+'-'+safeId+'-vs200', (pct > 0 ? '+' : '') + pct.toFixed(1) + '%', pct > 0 ? 'green' : 'red');
    setTdVal(pid+'-'+safeId+'-vs200', pct);
  }
  if (sma200w) {
    setSpan(pid+'-'+safeId+'-sma200w', fmtPrice(sma200w), price > sma200w ? 'green' : 'red');
    setTdVal(pid+'-'+safeId+'-sma200w', sma200w);
  }
  if (rsiD !== null) {
    setBadge(pid+'-'+safeId+'-rsid', rsiD.toFixed(1), rsiClass(rsiD));
    setTdVal(pid+'-'+safeId+'-rsid', rsiD);
  }
  if (rsiW !== null) {
    setBadge(pid+'-'+safeId+'-rsiw', rsiW.toFixed(1), rsiClass(rsiW));
    setTdVal(pid+'-'+safeId+'-rsiw', rsiW);
  }

  const atr = calcATR(dv);
  if (atr !== null) {
    const atrPct = (atr / price * 100);
    setSpan(pid+'-'+safeId+'-atr', '$'+atr.toFixed(2)+' ('+atrPct.toFixed(1)+'%)',
      atrPct > 5 ? 'amber' : '');
    setTdVal(pid+'-'+safeId+'-atr', atr);
  }

  // FCF Yield from pre-fetched JSON
  const fcfRaw = fcfData[sym];
  const fcfEl  = document.getElementById(pid+'-'+safeId+'-fcfy');
  if (fcfEl) {
    if (typeof fcfRaw === 'number') {
      const fcfPct = (fcfRaw * 100).toFixed(2) + '%';
      fcfEl.textContent = fcfPct;
      // Color: >= 5% strong green, 2-5% green, 0-2% amber, negative red
      const cls = fcfRaw >= 0.05 ? 'green' : fcfRaw >= 0.02 ? '' : fcfRaw >= 0 ? 'amber' : 'red';
      fcfEl.className = 'val' + (cls ? ' ' + cls : '');
      fcfEl.parentElement.setAttribute('data-val', fcfRaw * 100);
    } else {
      fcfEl.textContent = '—';
      fcfEl.className = 'val muted';
    }
  }

  const st = document.getElementById(pid + '-' + safeId + '-st');
  if (st) { st.textContent = '✓ done'; st.className = 'row-status done'; }
}

// ── Update summary strip ─────────────────────────────────────────────────────
function updateSummary(portfolioId) {
  const p = PORTFOLIOS.find(x => x.id === portfolioId);
  let above = 0, below = 0, ob = 0, os = 0;
  p.tickers.forEach(({ sym }) => {
    const safeId = sym.replace(/[^a-zA-Z0-9]/g, '_');
    const vs = document.getElementById(portfolioId + '-' + safeId + '-vs200');
    const rsid = document.getElementById(portfolioId + '-' + safeId + '-rsid');
    if (vs && vs.classList.contains('green')) above++;
    if (vs && vs.classList.contains('red'))   below++;
    if (rsid) {
      const v = parseFloat(rsid.textContent);
      if (!isNaN(v)) {
        if (v >= 70) ob++;
        if (v <= 30) os++;
      }
    }
  });
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('above200-' + portfolioId, above);
  set('below200-' + portfolioId, below);
  set('overbought-' + portfolioId, ob);
  set('oversold-'   + portfolioId, os);
}

// ── Main fetch ───────────────────────────────────────────────────────────────
async function fetchCurrentPortfolio() {
  const portfolio = PORTFOLIOS.find(p => p.id === activePortfolioId);
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  fetchAbort = false;
  updCredits();

  const total = portfolio.tickers.length * 2;
  let done = 0;
  setProgress(0, total);

  // Reset all rows to pending
  portfolio.tickers.forEach(({ sym }) => {
    const safeId = sym.replace(/[^a-zA-Z0-9]/g, '_');
    const st = document.getElementById(portfolio.id + '-' + safeId + '-st');
    if (st) { st.textContent = 'pending'; st.className = 'row-status'; }
    const priceReset = document.getElementById(portfolio.id + '-' + safeId + '-price');
    if (priceReset) { priceReset.textContent = '—'; priceReset.className = 'val muted'; }
    ['sma50','sma200','vs200','sma200w','atr','fcfy'].forEach(f => {
      const el = document.getElementById(portfolio.id + '-' + safeId + '-' + f);
      if (el) { el.textContent = '—'; el.className = 'val muted'; if (el.parentElement) el.parentElement.setAttribute('data-val',''); }
    });
    ['rsid','rsiw'].forEach(f => {
      const el = document.getElementById(portfolio.id + '-' + safeId + '-' + f);
      if (el) { el.textContent = '—'; el.className = 'rsi-badge muted'; if (el.parentElement) el.parentElement.setAttribute('data-val',''); }
    });
  });

  try {
    for (let i = 0; i < portfolio.tickers.length; i++) {
      const { sym, name } = portfolio.tickers[i];
      const safeId = sym.replace(/[^a-zA-Z0-9]/g, '_');

      if (fetchAbort) break;

      // Mark row loading
      const st = document.getElementById(portfolio.id + '-' + safeId + '-st');
      if (st) { st.textContent = 'loading…'; st.className = 'row-status loading'; }

      // ETA calc
      const remaining = portfolio.tickers.length - i;
      const callsLeft = remaining * 2;
      const recentCalls = callTimestamps.filter(t => Date.now() - t < WINDOW_MS).length;
      const cooldownsLeft = Math.max(0, Math.floor((recentCalls + callsLeft - 1) / 8));
      const estSecs = Math.ceil(callsLeft / 8) * 5 + cooldownsLeft * WINDOW_MS / 1000;
      const estMins = Math.ceil(estSecs / 60);
      setETA(estMins > 1 ? '~' + estMins + 'min remaining' : '< 1 min remaining');

      setStatus('Fetching ' + sym + ' (' + (i + 1) + '/' + portfolio.tickers.length + ')...', 'loading');

      let daily, weekly;
      try {
        daily = await apiGet(sym, '1day');
        done++; setProgress(done, total);
        weekly = await apiGet(sym, '1week');
        done++; setProgress(done, total);
        renderRow(portfolio.id, sym, daily, weekly);
        updateSummary(portfolio.id);
      } catch (rowErr) {
        if (rowErr.message === 'ABORTED') break;
        if (st) { st.textContent = '✗ ' + rowErr.message.slice(0, 20); st.className = 'row-status error'; }
        done += 2; setProgress(done, total);
      }
    }

    setStatus('Done — ' + portfolio.name + ' loaded at ' + new Date().toLocaleTimeString(), '');
    setETA('');
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
  }

  btn.disabled = false;
  setProgress(total, total);
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildUI();
loadFCFData();
</script>
</body>
</html>
